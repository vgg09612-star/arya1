<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماڵپەڕی هۆلۆگرامی پڕۆفیشناڵ</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505; /* باکگراوندێکی تاریک بۆ دەرکەوتنی هۆلۆگرامەکە */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #00ffcc;
            z-index: 100;
            pointer-events: none; /* بۆ ئەوەی ڕێگری نەکات لە دەستلێدانی شاشەکە */
            text-shadow: 0 0 10px #00ffcc;
        }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0 0; font-size: 14px; color: #fff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>سیستەمی هۆلۆگرامی زیرەک</h1>
        <p>دوگمەی (START AR) دابگرە بۆ بینینی هۆلۆگرامەکە لە ژوورەکەتدا</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let camera, scene, renderer;
        let hologramObject;

        init();
        animate();

        function init() {
            // ١. دروستکردنی دیمەن (Scene)
            scene = new THREE.Scene();

            // ٢. دانانی کامێرا
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // ٣. ڕووناکی (بۆ ئەوەی تەنەکە بە جوانی دەربکەوێت)
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 3);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // ٤. دروستکردنی تەنە هۆلۆگرامییەکە (شێوەیەکی ئاڵۆزی ئەندازەیی دەدرەوشێتەوە)
            const geometry = new THREE.TorusKnotGeometry(0.15, 0.04, 128, 32); // شێوەی گرێیەکی سێ ڕەهەندی
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ffff, // ڕەنگی شینباوی هۆلۆگرامی
                emissive: 0x0088aa, // درەوشانەوەی ناوەوە
                wireframe: true, // پیشاندانی هێڵەکانی پێکهاتەکە
                transparent: true,
                opacity: 0.8
            });
            
            hologramObject = new THREE.Mesh(geometry, material);
            hologramObject.position.set(0, 0, -0.6); // دانانی نیو مەتر لە پێش چاوی بەکارهێنەرەوە
            scene.add(hologramObject);

            // ٥. ڕێکخستنی ڕێندەرەر بۆ پشتگیریکردنی AR
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // کاراکردنی تایبەتمەندی ڕاستەقینەی زیادکراو (AR)
            document.body.appendChild(renderer.domElement);

            // ٦. زیادکردنی دوگمەی AR بۆ سەر شاشەکە
            document.body.appendChild(ARButton.createButton(renderer));

            // گونجاندنی شاشە کاتێک قەبارەی دەگۆڕێت
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ٧. جووڵەپێکردن و سووڕاندنەوەی هۆلۆگرامەکە
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            if (hologramObject) {
                hologramObject.rotation.x += 0.005;
                hologramObject.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
