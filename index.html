 [<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دڵخۆش | هاوڕێی من</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#7a5cff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:700px;
    height:85vh;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.header{
    padding:20px;
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.chat{
    height:70%;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin:10px 0;
    padding:12px 18px;
    border-radius:18px;
    max-width:80%;
}

.bot{
    background:white;
    color:#333;
}

.user{
    background:#7a5cff;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
}

button{
    background:#7a5cff;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">💜 دڵخۆش</div>

    <div class="chat" id="chat">
        <div class="message bot">
            سڵاو ❤️ من هاوڕێی دیجیتاڵی تۆم. باسی ڕۆژەکەت بۆم بکە.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="پەیام بنووسە...">
        <button onclick="sendMessage()">ناردن</button>
    </div>
</div>

<script>
function sendMessage(){
    let input = document.getElementById("userInput");
    let text = input.value;

    if(text.trim() === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
      <div class="message user">${text}</div>
    `;

    let replies = [
      "من گوێم لێتە ❤️",
      "باسی زیاتر بکە.",
      "جوانە، دڵم خۆش بوو.",
      "ئەمڕۆت چۆن تێپەڕی؟",
      "سوپاس بۆ ئەوەی هاوبەشی دەکەیت."
    ];

    let reply = replies[Math.floor(Math.random()*replies.length)];

    setTimeout(()=>{
      chat.innerHTML += `
        <div class="message bot">${reply}</div>
      `;
      chat.scrollTop = chat.scrollHeight;
    },700);

    input.value="";
}
</script>

</body>
</html>
