<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Hologram Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
overflow:hidden;
color:#00ffff;
}

#ui{
position:absolute;
top:20px;
left:20px;
width:350px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
padding:20px;
border:1px solid #00ffff;
border-radius:15px;
z-index:100;
}

h1{
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #00ffff;
color:white;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#00ffff;
border:none;
cursor:pointer;
font-weight:bold;
}

#response{
margin-top:15px;
height:150px;
overflow:auto;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
<h1>AI Assistant</h1>

<input id="userInput"
placeholder="Ask me anything...">

<button onclick="talk()">Send</button>

<div id="response">
Ready...
</div>
</div>

<script type="module">

import * as THREE from
'https://unpkg.com/three@0.160.0/build/three.module.js';

const scene=new THREE.Scene();

const camera=
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

camera.position.z=5;

const geometry=
new THREE.CapsuleGeometry(
1,
2,
12,
24
);

const material=
new THREE.MeshBasicMaterial({
color:0x00ffff,
wireframe:true
});

const hologram=
new THREE.Mesh(
geometry,
material
);

scene.add(hologram);

const ring=
new THREE.Mesh(
new THREE.TorusGeometry(
2,
0.05,
16,
100
),
new THREE.MeshBasicMaterial({
color:0x00ffff
})
);

ring.rotation.x=Math.PI/2;

scene.add(ring);

function animate(){

requestAnimationFrame(
animate
);

hologram.rotation.y+=0.01;

hologram.position.y=
Math.sin(
Date.now()*0.002
)*0.2;

ring.rotation.z+=0.01;

renderer.render(
scene,
camera
);

}

animate();

window.addEventListener(
'resize',
()=>{
camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);
}
);

window.talk=()=>{

let text=
document.getElementById(
"userInput"
).value;

let response=
"AI Response: " + text;

document.getElementById(
"response"
).innerHTML=response;

if(
"speechSynthesis"
in window
){

let utter=
new SpeechSynthesisUtterance(
response
);

speechSynthesis.speak(
utter
);

}

};

document.body.addEventListener(
"click",
()=>{

hologram.scale.set(
1.2,
1.2,
1.2
);

setTimeout(()=>{
hologram.scale.set(
1,
1,
1
);
},300);

}
);

</script>

</body>
</html>
