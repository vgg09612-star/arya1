‌<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hologram Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#overlay{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

.panel{
width:350px;
padding:20px;
border-radius:20px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(15px);
border:1px solid cyan;
color:white;
}

.panel h1{
margin-bottom:15px;
}

#chat{
height:250px;
overflow-y:auto;
border:1px solid #333;
padding:10px;
margin-bottom:10px;
}

#message{
width:100%;
padding:10px;
margin-bottom:10px;
background:#111;
color:white;
border:1px solid cyan;
}

#sendBtn{
width:100%;
padding:10px;
cursor:pointer;
background:cyan;
border:none;
font-weight:bold;
}
</style>
</head>
<body>

<div id="overlay">
<div class="panel">

<h1>AI Hologram Assistant</h1>

<div id="chat"></div>

<input
id="message"
type="text"
placeholder="Write a message..."
>

<button id="sendBtn">
Send
</button>

</div>
</div>

<canvas id="bg"></canvas>

<script type="module">

import * as THREE from
"https://unpkg.com/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer =
new THREE.WebGLRenderer({
canvas:document.getElementById("bg"),
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

camera.position.z = 5;

const geometry =
new THREE.CapsuleGeometry(
1,
2,
16,
32
);

const material =
new THREE.MeshBasicMaterial({
color:0x00ffff,
wireframe:true
});

const hologram =
new THREE.Mesh(
geometry,
material
);

scene.add(hologram);

const ring =
new THREE.Mesh(
new THREE.TorusGeometry(
2,
0.05,
16,
100
),
new THREE.MeshBasicMaterial({
color:0x00ffff
})
);

ring.rotation.x = Math.PI/2;
scene.add(ring);

function animate(){

requestAnimationFrame(
animate
);

hologram.rotation.y += 0.01;

hologram.position.y =
Math.sin(Date.now()*0.002)*0.2;

ring.rotation.z += 0.01;

renderer.render(
scene,
camera
);

}

animate();

const chat =
document.getElementById("chat");

document
.getElementById("sendBtn")
.addEventListener(
"click",
()=>{

const input =
document.getElementById(
"message"
);

const text = input.value;

if(!text) return;

chat.innerHTML +=
`<p><b>You:</b> ${text}</p>`;

chat.innerHTML +=
`<p><b>AI:</b> Message received.</p>`;

if("speechSynthesis" in window){

speechSynthesis.speak(
new SpeechSynthesisUtterance(
"Message received"
)
);

}

input.value="";

}
);

window.addEventListener(
"resize",
()=>{

camera.aspect=
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>

</body>
</html>
