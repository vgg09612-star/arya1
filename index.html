<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دڵخۆش | هاوڕێی من</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#7a5cff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:700px;
    height:85vh;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.header{
    padding:20px;
    text-align:center;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.chat{
    height:70%;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin:10px 0;
    padding:12px 18px;
    border-radius:18px;
    max-width:80%;
    white-space: pre-wrap;
    direction: rtl;
}

.bot{
    background:white;
    color:#333;
}

.user{
    background:#7a5cff;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:15px;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    direction: rtl;
}

button{
    background:#7a5cff;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <div class="header">💜 دڵخۆش</div>

    <div class="chat" id="chat">
        <div class="message bot">
            سڵاو ❤️ من هاوڕێی دیجیتاڵی تۆم. باسی ڕۆژەکەت بۆم بکە یان هەر پرسیارێکت هەیە لێم بکە!
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="پەیام بنووسە...">
        <button onclick="sendMessage()">ناردن</button>
    </div>
</div>

<script>
// کلیلەکەت لێرەدا بە ئامادەیی داندراوە و پێویست بە دەستکاری ناکات
const API_KEY = "AQ.Ab8RN6IpjSGWmuNv_xZsLE5KXu1e-nWQYjb2grFjLXUKQ-AuBQ"; 

async function sendMessage(){
    let input = document.getElementById("userInput");
    let text = input.value.trim();

    if(text === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
      <div class="message user">${text}</div>
    `;
    chat.scrollTop = chat.scrollHeight;
    input.value = "";

    let loadingId = "loading-" + Date.now();
    chat.innerHTML += `
      <div class="message bot" id="${loadingId}">دڵخۆش خەریکە بیر دەکاتەوە... ⏳</div>
    `;
    chat.scrollTop = chat.scrollHeight;

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AQ.Ab8RN6IpjSGWmuNv_xZsLE5KXu1e-nWQYjb2grFjLXUKQ-AuBQ}`;

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: text }] }]
            })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            let aiResponse = data.candidates[0].content.parts[0].text;
            document.getElementById(loadingId).innerText = aiResponse;
        } else {
            document.getElementById(loadingId).innerText = "ببوورە، نەمتوانی وەڵامەکەت بدەمەوە. تکایە دووبارە تاقیکەرەوە.";
        }
    } catch (error) {
        document.getElementById(loadingId).innerText = "خەتایەک ڕوویدا! دڵنیا ببەوە کلیلەکەت (API Key) بە دروستی داناوە.";
    }

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
