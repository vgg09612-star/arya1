<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shexha Group - Real Estate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --surface-color: #ffffff;
            --text-color: #1a1a1a;
            --text-muted: #6c757d;
            --primary-color: #d92323;
            --primary-hover: #b01c1c;
            --border-color: #e9ecef;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #0b0f19;
            --surface-color: #161c2d;
            --text-color: #f8f9fa;
            --text-muted: #a0aec0;
            --border-color: #2d3748;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }

        /* بەشی خزمەتگوزاری */
        .services-section { max-width: 1400px; margin: 40px auto; padding: 0 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .service-card { padding: 30px; border-radius: 20px; background: var(--surface-color); border: 1px solid var(--border-color); text-align: center; cursor: pointer; transition: var(--transition); }
        .service-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: var(--shadow); }
        .service-card i { font-size: 40px; color: var(--primary-color); margin-bottom: 15px; }

        /* مۆدێل و خەریتە */
        .map-container { width: 100%; height: 300px; border-radius: 15px; margin-top: 15px; overflow: hidden; border: 2px solid var(--border-color); }
        .doc-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: var(--primary-color); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }

        /* باقی دیزاینەکان (هەمان کۆدی پێشووت) */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }
        .splash-logo { max-width: 280px; margin-bottom: 25px; animation: pulse 2s infinite ease-in-out; }
        .enter-btn { padding: 12px 35px; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; cursor: pointer; }
        header { position: sticky; top: 0; background-color: var(--surface-color); box-shadow: var(--shadow); z-index: 1000; padding: 15px 25px; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: none; border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 20px; color: var(--text-color); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .hero { padding: 60px 25px; text-align: center; }
        .tabs-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-trigger { padding: 12px 30px; border: none; background-color: var(--surface-color); border-radius: 30px; cursor: pointer; font-weight: bold; }
        .tab-trigger.active { background-color: var(--primary-color); color: white; }
        .grid-section { display: none; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .grid-section.active { display: grid; }
        .property-card { background-color: var(--surface-color); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
        .card-image { height: 240px; background-size: cover; background-position: center; }
        .card-body { padding: 25px; }
        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-buy { background-color: var(--primary-color); color: white; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--surface-color); width: 90%; max-width: 700px; padding: 30px; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="1000012449.jpg" alt="Logo" class="splash-logo">
        <button class="enter-btn" onclick="initWebsite()">چوونە ناو سایت</button>
    </div>

    <!-- Header -->
    <header>
        <div class="nav-container">
            <img src="1000012449.jpg" style="height:45px;" onclick="window.location.reload()">
            <div class="nav-icons">
                <button class="nav-btn" toggle-theme><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </header>

    <!-- Services Section -->
    <section class="services-section">
        <div class="service-card" onclick="alert('ئەمە خزمەتگوزاری ڕاوێژکاری یاساییە')">
            <i class="fa-solid fa-gavel"></i>
            <h3>ڕاوێژکاری یاسایی</h3>
        </div>
        <div class="service-card" onclick="alert('خزمەتگوزاری دیزاینی ناوەوە و کەرەستە')">
            <i class="fa-solid fa-couch"></i>
            <h3>دیزاینی ناوەوە</h3>
        </div>
        <div class="service-card" onclick="alert('خزمەتگوزاری گواستنەوە و دابینکردن')">
            <i class="fa-solid fa-truck-moving"></i>
            <h3>گواستنەوە</h3>
        </div>
    </section>

    <!-- Content -->
    <main style="max-width: 1400px; margin: 0 auto; padding: 20px;">
        <div id="section-villas" class="grid-section active">
            <!-- زیادکردنی خانو و شوقەی زیاتر -->
            <!-- Villa 1 -->
            <div class="property-card">
                <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=600&q=80')"></div>
                <div class="card-body">
                    <h3>Villa Royal</h3>
                    <p>$450,000</p>
                    <button class="btn-action btn-buy" onclick="openDetails('Villa Royal', '450,000')">وردەکاری و خەریتە</button>
                </div>
            </div>
            <!-- Villa 2 -->
            <div class="property-card">
                <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=600&q=80')"></div>
                <div class="card-body">
                    <h3>Villa Dream</h3>
                    <p>$350,000</p>
                    <button class="btn-action btn-buy" onclick="openDetails('Villa Dream', '350,000')">وردەکاری و خەریتە</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="float:left; border:none; background:none; cursor:pointer;">X</button>
            <h2 id="modal-title"></h2>
            <div class="map-container">
                <!-- شوێنی خەریتەی گۆگڵ -->
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3238.25!2d45.43!3d35.55!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDMzJzAwLjAiTiA0NcKwMjUnNDguMCJF!5e0!3m2!1sen!2siq!4v1610000000000" width="100%" height="100%" style="border:0;" allowfullscreen=""></iframe>
            </div>
            <a href="#" class="doc-link">داگرتنی بەڵگەنامە (PDF)</a>
        </div>
    </div>

    <script>
        function initWebsite() { document.getElementById('splash-screen').classList.add('hidden'); }
        function openDetails(title, price) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('details-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('details-modal').classList.remove('active'); }
        
        // دارک مۆد
        document.querySelector('[toggle-theme]').addEventListener('click', () => {
            document.documentElement.toggleAttribute('data-theme');
        });
    </script>
</body>
</html>
