<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شایەن - یاریدەدەری زیرەکی شاهانە</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;700&display=swap');

        :root {
            --gold-primary: #D4AF37;
            --gold-dark: #AA7C11;
            --gold-light: #F3E5AB;
            --luxury-black: #0F1115;
            --luxury-bg: #07080a;
            --cream-white: #F5F2EB;
            --glass-bg: rgba(15, 17, 21, 0.75);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans Arabic', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--luxury-bg);
            color: var(--cream-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.08), transparent 60%),
                radial-gradient(circle at 10% 80%, rgba(15, 17, 21, 0.5), transparent 50%);
        }

        /* Top Luxury Header Bar */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(7, 8, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-icon {
            width: 12px;
            height: 12px;
            background: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold-primary);
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFF, var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Workspace Layout */
        .main-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 30px;
            height: calc(100vh - 85px);
            position: relative;
        }

        /* Hologram Interactive Stage */
        .hologram-stage {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: rgba(15, 17, 21, 0.4);
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hologram-container {
            width: 280px;
            height: 280px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hologram Size Scaling Modifiers */
        .hologram-container.large {
            width: 420px;
            height: 420px;
        }

        /* Royal Glowing Orbs & Waves */
        .hologram-core {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0) 70%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hologram-sphere {
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212,175,55,0.4) 0%, rgba(170,124,17,0.1) 100%);
            border: 2px solid var(--gold-primary);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3), inset 0 0 30px rgba(212, 175, 55, 0.2);
            animation: float 4s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        /* Speaking Active Motion Simulation */
        .hologram-container.speaking .hologram-sphere {
            animation: pulse-speaking 0.6s ease-in-out infinite alternate;
            border-color: #FFF;
            box-shadow: 0 0 70px rgba(255, 255, 255, 0.4), inset 0 0 40px var(--gold-primary);
        }

        .hologram-ring {
            position: absolute;
            border: 1px dashed var(--gold-dark);
            border-radius: 50%;
            animation: rotate 15s linear infinite;
            opacity: 0.4;
        }

        .ring-1 { width: 90%; height: 90%; animation-duration: 20s; }
        .ring-2 { width: 110%; height: 110%; animation-duration: 10s; animation-direction: reverse; }

        .hologram-base {
            width: 200px;
            height: 20px;
            background: rgba(212, 175, 55, 0.2);
            filter: blur(8px);
            border-radius: 50%;
            position: absolute;
            bottom: -30px;
            animation: base-glow 4s ease-in-out infinite;
        }

        /* Control UI Floating Panel */
        .hologram-controls {
            position: absolute;
            bottom: 25px;
            display: flex;
            gap: 15px;
            background: var(--glass-bg);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            z-index: 5;
        }

        .btn-luxury {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--cream-white);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-luxury:hover {
            background: var(--gold-primary);
            color: var(--luxury-black);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            border-color: var(--gold-primary);
        }

        .btn-luxury.active {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold-primary);
        }

        /* Right Panel: Content, Custom Circular Sections & Accessories Smart-Grid */
        .content-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .content-sidebar::-webkit-scrollbar { width: 5px; }
        .content-sidebar::-webkit-scrollbar-track { background: transparent; }
        .content-sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .luxury-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(15px);
            position: relative;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Circular Icon Token Badge */
        .circle-badge {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--gold-primary);
            font-weight: bold;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
            flex-shrink: 0;
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #FFF;
        }

        /* Automated Accessories Showroom */
        .accessories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .accessory-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .accessory-item:hover {
            border-color: var(--gold-primary);
            background: rgba(212, 175, 55, 0.04);
            transform: translateY(-3px);
        }

        .accessory-img-placeholder {
            width: 100%;
            height: 90px;
            background: linear-gradient(45deg, #14171f, #1e2330);
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(212, 175, 55, 0.05);
            position: relative;
        }

        .accessory-img-placeholder svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: var(--gold-primary);
            stroke-width: 1.5;
            opacity: 0.7;
        }

        .accessory-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--cream-white);
        }

        /* Keyframe Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulse-speaking {
            0% { transform: scale(1) translateY(-7px); }
            100% { transform: scale(1.18) translateY(-10px); }
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes base-glow {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(1); }
        }

        .restore-trigger {
            position: fixed;
            top: 110px;
            right: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--gold-primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 1000;
            display: none;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-icon"></div>
            <div class="brand-name">SHAHEN AI v2.0</div>
        </div>
        <div>
            <div id="audio-indicator" style="font-size: 0.85rem; color: var(--gold-primary); display: flex; align-items: center; gap: 8px;">
                <span style="width:8px; height:8px; background:#ff4a4a; border-radius:50%; display:inline-block;"></span>
                دەنگ چالاک نییە (کلیک بکە بۆ چاککردن)
            </div>
        </div>
    </header>

    <button class="restore-trigger" id="btn-restore" onclick="toggleHologramVisibility()">👁️ پیشاندانەوەی هۆڵۆگرام</button>

    <div class="main-container">
        <div class="hologram-stage" id="stage-area">
            <div class="hologram-container" id="hologram-avatar">
                <div class="hologram-core">
                    <div class="hologram-ring ring-1"></div>
                    <div class="hologram-ring ring-2"></div>
                    <div class="hologram-sphere"></div>
                </div>
                <div class="hologram-base"></div>
            </div>

            <div class="hologram-controls">
                <button class="btn-luxury" onclick="toggleHologramVisibility()">👁️ شاردنەوە</button>
                <button class="btn-luxury" id="btn-size" onclick="toggleHologramSize()">🔍 گەورەکردن</button>
                <button class="btn-luxury" id="btn-talk" onclick="simulateSpeaking()">🎙️ تاقیکردنەوەی قسەکردن</button>
            </div>
        </div>

        <div class="content-sidebar">
            <div class="luxury-card">
                <div class="section-header">
                    <div class="circle-badge">٠١</div>
                    <div class="section-title">زانیاری گشتی سیستەم</div>
                </div>
                <p style="font-size: 0.9rem; line-height: 1.6; color: rgba(245,242,235,0.8);">
                    سیستەمی شایەن بە تەواوی نوێکراوەتەوە بۆ شێوازێکی مۆدێرن و شاهانە.
                </p>
            </div>

            <div class="luxury-card">
                <div class="section-header">
                    <div class="circle-badge">٠٢</div>
                    <div class="section-title">ئێکسسواراتە شاهانەییەکان (خۆکار)</div>
                </div>
                <div class="accessories-grid">
                    <div class="accessory-item">
                        <div class="accessory-img-placeholder">
                            <svg viewBox="0 0 24 24"><path d="M12 6a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 2v4l2.5 1.5M12 2v4M12 18v4"/></svg>
                        </div>
                        <div class="accessory-name">کاتژمێری ئۆتۆماتیک</div>
                    </div>
                    <div class="accessory-item">
                        <div class="accessory-img-placeholder">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="14" r="5"/><path d="M12 9V5l-2-1h4l-2 1"/></svg>
                        </div>
                        <div class="accessory-name">ئەڵقەی ئەڵماس</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isSpeaking = false; let isLarge = false; let audioCtx = false;

        document.body.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = true;
                document.getElementById('audio-indicator').innerHTML = '<span style="width:8px; height:8px; background:#4aff59; border-radius:50%; display:inline-block;"></span> دەنگ چالاکە';
                document.getElementById('audio-indicator').style.color = "#4aff59";
            }
        });

        function toggleHologramVisibility() {
            const stage = document.getElementById('hologram-avatar');
            const restoreBtn = document.getElementById('btn-restore');
            if (stage.style.opacity === '0') {
                stage.style.opacity = '1'; stage.style.transform = 'scale(1)'; restoreBtn.style.display = 'none';
            } else {
                stage.style.opacity = '0'; stage.style.transform = 'scale(0.8)'; restoreBtn.style.display = 'block';
            }
        }

        function toggleHologramSize() {
            const avatar = document.getElementById('hologram-avatar');
            const btn = document.getElementById('btn-size');
            isLarge = !isLarge;
            if (isLarge) { avatar.classList.add('large'); btn.innerText = '📉 بچوکردنەوە'; }
            else { avatar.classList.remove('large'); btn.innerText = '🔍 گەورەکردن'; }
        }

        function simulateSpeaking() {
            const avatar = document.getElementById('hologram-avatar');
            const btn = document.getElementById('btn-talk');
            isSpeaking = !isSpeaking;
            if (isSpeaking) { avatar.classList.add('speaking'); btn.innerText = '🛑 ڕاگرتنی جوڵە'; }
            else { avatar.classList.remove('speaking'); btn.innerText = '🎙️ تاقیکردنەوەی قسەکردن'; }
        }
    </script>
</body>
</html>
