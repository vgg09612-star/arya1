<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHAHEN ELITE MASTER V4</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #050505;
            --white: #F8F8F8;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--white); height: 100vh; overflow: hidden; display: flex; touch-action: pan-y; }

        /* 120Hz Fluid Container */
        .viewport { display: flex; width: 100vw; height: 100vh; }

        /* Left: Hologram Stage */
        .hologram-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid var(--gold); }
        .holo-entity { 
            width: 300px; height: 600px; border: 2px solid var(--gold); border-radius: 120px 120px 20px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }
        .black-dress { width: 100%; height: 65%; background: #000; border-radius: 0 0 20px 20px; position: absolute; bottom: 0; }

        /* Right: Dashboard (Market/Villa/Apartment) */
        .dashboard { width: 400px; padding: 20px; overflow-y: auto; background: var(--dark); }
        .card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { color: var(--gold); margin-bottom: 15px; font-size: 1.2rem; }
        .price { color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="hologram-stage">
        <div class="holo-entity" id="holo">
            <div class="black-dress"></div>
        </div>
        <button onclick="toggleSize()" style="margin-top:20px; padding:10px 30px; background:var(--gold); border:none; cursor:pointer;">گەورەکردن بۆ نمایش</button>
    </div>

    <div class="dashboard">
        <h2>بازاڕی دراو</h2>
        <div class="card">
            <p>زێڕ (2 مسقاڵ): <span class="price">1,035,000 IQD</span></p>
            <p>بیتکۆین: <span class="price">$67,200</span></p>
        </div>

        <h2>ڤێلا و شوقەکان</h2>
        <div class="card">
            <p>ڤێلای مۆدێرن - نەخشەی خودکارانە</p>
            <p class="price">$450,000</p>
        </div>

        <h2>ئێکسسوارات و خزمەتگوزاری</h2>
        <div class="card">
            <p>کاڵای لوکس - دیزاینی 2026</p>
            <p>خزمەتگوزاری ئەمنی و لۆجستیک</p>
        </div>
    </div>
</div>

<script>
    function toggleSize() {
        const h = document.getElementById('holo');
        h.style.width = (h.style.width === '500px') ? '300px' : '500px';
        h.style.height = (h.style.height === '800px') ? '600px' : '800px';
    }
</script>
</body>
</html>
