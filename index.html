<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شێخە گروپ | Shekha Group</title>
    <style>
        /* دیزاینی گشتی - مۆدێرن و تاریک */
        :root { --gold: #d4af37; --bg: #050505; --white: #f4f4f4; }
        body { margin: 0; background: var(--bg); color: var(--white); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); text-align: center; }
        .hero h1 { font-size: 6rem; color: var(--gold); letter-spacing: 15px; }

        .container { width: 90%; margin: 50px auto; }
        .module { border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 30px; background: #111; }
        .module-header { padding: 30px; cursor: pointer; color: var(--gold); font-size: 2rem; border-bottom: 1px solid var(--gold); }
        .module-content { padding: 40px; background: #151515; display: none; }

        .form-group { margin: 20px 0; padding: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--gold); color: var(--white); }
        .btn-submit { background: var(--gold); color: black; padding: 20px; width: 100%; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #fff; }
    </style>
</head>
<body>

<section class="hero">
    <h1>شێخە گروپ</h1>
</section>

<div class="container">
    <div class="module">
        <div class="module-header" onclick="show(this)">شوقە و نیشتەجێبوون ⌄</div>
        <div class="module-content">
            <div class="form-group">
                <h3>١. ژمێریاری نرخی شوقە</h3>
                <input type="number" id="m1" placeholder="ڕووبەری شوقە بە مەتر">
                <button class="btn-submit" onclick="calc(1)">هەژمارکردن</button>
                <p id="r1"></p>
            </div>
            <div class="form-group">
                <h3>٢ & ٣. تۆمارکردن و وەرگرتنی تاپۆ</h3>
                <input type="text" id="n1" placeholder="ناوی تەواوی کڕیار">
                <input type="tel" id="p1" placeholder="ژمارەی تەلەفۆن">
                <button class="btn-submit" onclick="issue(1)">دەرکردنی تاپۆی فەرمی</button>
            </div>
        </div>
    </div>

    <div class="module">
        <div class="module-header" onclick="show(this)">ڤێلا و خانووی لوکس ⌄</div>
        <div class="module-content">
            <div class="form-group">
                <h3>١. ژمێریاری نرخی ڤێلا</h3>
                <input type="number" id="m2" placeholder="ڕووبەری ڤێلا بە مەتر">
                <button class="btn-submit" onclick="calc(2)">هەژمارکردن</button>
                <p id="r2"></p>
            </div>
            <div class="form-group">
                <h3>٢ & ٣. تۆمارکردن و وەرگرتنی تاپۆ</h3>
                <input type="text" id="n2" placeholder="ناوی تەواوی کڕیار">
                <input type="tel" id="p2" placeholder="ژمارەی تەلەفۆن">
                <button class="btn-submit" onclick="issue(2)">دەرکردنی تاپۆی فەرمی</button>
            </div>
        </div>
    </div>

    <div class="module">
        <div class="module-header" onclick="show(this)">ئێکسسواراتی لوکس ⌄</div>
        <div class="module-content">
            <div class="form-group">
                <h3>١. ژمێریاری نرخی ئێکسسوارات</h3>
                <input type="number" id="m3" placeholder="نرخی کاڵا">
                <button class="btn-submit" onclick="calc(3)">هەژمارکردن</button>
                <p id="r3"></p>
            </div>
            <div class="form-group">
                <h3>٢ & ٣. تۆمارکردن و وەرگرتنی بەڵگەنامە</h3>
                <input type="text" id="n3" placeholder="ناوی تەواوی کڕیار">
                <input type="tel" id="p3" placeholder="ژمارەی تەلەفۆن">
                <button class="btn-submit" onclick="issue(3)">وەرگرتنی بەڵگەنامە</button>
            </div>
        </div>
    </div>
</div>

<script>
    function show(el) { el.nextElementSibling.style.display = (el.nextElementSibling.style.display === 'block') ? 'none' : 'block'; }
    function calc(id) { let val = document.getElementById('m'+id).value; document.getElementById('r'+id).innerText = "نرخی کۆتایی: " + (val * 950) + "$"; }
    function issue(id) {
        let n = document.getElementById('n'+id).value;
        let p = document.getElementById('p'+id).value;
        if(n.length < 3 || p.length < 10) alert("تکایە زانیارییەکان بە ڕاستی پڕ بکەرەوە.");
        else alert("پیرۆزە " + n + "! بەڵگەنامە و تاپۆکەت ئامادەیە.");
    }
</script>

</body>
</html>
