<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEX ARYA | Global Terminal</title>
    <style>
        :root { --pure-black: #000000; --gold: #ffd700; --blue: #2962ff; --border: #1a1a1a; }
        body { background: var(--pure-black); color: #fff; font-family: 'Tajawal', sans-serif; margin: 0; }

        /* ئایەتەکان */
        .quran-container { text-align: center; padding: 40px; border-bottom: 1px solid #333; }
        #quran { font-size: 1.8rem; color: var(--gold); transition: opacity 1s; min-height: 50px; }

        /* چارتە سەربەخۆکان */
        .grid-charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 15px; padding: 20px; }
        .chart-box { height: 450px; background: #080808; border: 1px solid var(--border); border-radius: 8px; }

        /* خشتەی نرخ */
        .record-section { padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #050505; }
        th, td { padding: 15px; border: 1px solid #333; text-align: center; }

        /* چات */
        #chat-window { position: fixed; top: 100px; left: 100px; width: 350px; background: #000; border: 1px solid #444; border-radius: 10px; display: none; z-index: 999; }
        #drag-handle { padding: 10px; background: #111; cursor: move; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <!-- ئەنیمەیشنی ئایەتەکان -->
    <div class="quran-container">
        <div id="quran">«وَرَحْمَتِي وَسِعَتْ كُلَّ شَيْءٍ»</div>
    </div>

    <!-- چارتە سەربەخۆ جیهانییەکان -->
    <div class="grid-charts">
        <div class="chart-box" id="chart-gold"></div>
        <div class="chart-box" id="chart-silver"></div>
        <div class="chart-box" id="chart-btc"></div>
        <div class="chart-box" id="chart-oil"></div>
    </div>

    <!-- خشتەی تۆمارکردن -->
    <div class="record-section">
        <table>
            <thead><tr><th>بەروار</th><th>زێڕ (XAU)</th><th>زیو (XAG)</th></tr></thead>
            <tbody id="log-body"><tr><td>1/6/2026</td><td>بازاڕ کراوەیە</td><td>بازاڕ کراوەیە</td></tr></tbody>
        </table>
    </div>

    <!-- چات بۆت -->
    <div id="chat-window">
        <div id="drag-handle"><span>Gemini AI</span><span onclick="toggleChat()" style="cursor:pointer">✕</span></div>
        <div style="height: 200px; padding: 10px; overflow-y: scroll;">سڵاو، چۆن یارمەتیت بدەم؟</div>
        <input type="text" style="width:90%; margin:10px; background:#111; color:#fff;" placeholder="پرسیار...">
    </div>

    <button style="position:fixed; bottom:30px; right:30px; padding:15px; border-radius:50%; background:var(--blue); border:none; color:#fff;" onclick="toggleChat()">✦</button>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // ئەنیمەیشنی ئایەتەکان
        const ayats = ["«وَرَحْمَتِي وَسِعَتْ كُلَّ شَيْءٍ»", "«وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ»", "«إِنَّ مَعَ الْعُسْرِ يُسْرًا»"];
        let i = 0;
        setInterval(() => {
            document.getElementById('quran').style.opacity = 0;
            setTimeout(() => { document.getElementById('quran').innerText = ayats[i]; document.getElementById('quran').style.opacity = 1; i = (i + 1) % ayats.length; }, 1000);
        }, 5000);

        // چارتە سەربەخۆکان (نرخی جیهانی)
        const symbols = ["OANDA:XAUUSD", "OANDA:XAGUSD", "BINANCE:BTCUSDT", "OANDA:USOIL"];
        const containers = ["chart-gold", "chart-silver", "chart-btc", "chart-oil"];
        
        symbols.forEach((sym, index) => {
            new TradingView.widget({
                "container_id": containers[index],
                "symbol": sym,
                "autosize": true,
                "theme": "dark",
                "style": "1",
                "interval": "D",
                "timezone": "Asia/Baghdad"
            });
        });

        // چاتی جوڵاو
        function toggleChat() { document.getElementById('chat-window').style.display = document.getElementById('chat-window').style.display === 'none' ? 'block' : 'none'; }
        const drag = document.getElementById('chat-window'), handle = document.getElementById('drag-handle');
        let active = false;
        handle.onmousedown = () => active = true;
        document.onmousemove = (e) => { if(active) { drag.style.left = e.clientX - 50 + "px"; drag.style.top = e.clientY - 10 + "px"; } };
        document.onmouseup = () => active = false;
    </script>
</body>
</html>
